        // ─── 1. CONSTANTS ────────────────────────────────────────────────────

                    { title: "✏️ Discoverable Project Rename", description: "A pencil icon now appears on hover over project headers, making rename more discoverable. Double-click still works too." },

        };

        const PRIORITIES = {
            LOW:    'PRIORITY_LOW',
            MEDIUM: 'PRIORITY_MEDIUM',
            HIGH:   'PRIORITY_HIGH'
        };

        const PRIORITY_CONFIG = {
            [PRIORITIES.LOW]:    { title: "Low",    color: "text-sky-400",    bgColor: "bg-sky-500/20",    borderColor: "border-sky-500",    pulseClass: 'pulse-border-low'     },
            [PRIORITIES.MEDIUM]: { title: "Medium", color: "text-yellow-400", bgColor: "bg-yellow-500/20", borderColor: "border-yellow-500", pulseClass: 'pulse-border-medium'  },
            [PRIORITIES.HIGH]:   { title: "High",   color: "text-red-400",    bgColor: "bg-red-500/20",    borderColor: "border-red-500",    pulseClass: 'pulse-border-high'    },
            null:                { title: "Unprioritized", color: "text-slate-400", bgColor: "bg-slate-500/10", borderColor: "border-slate-600", pulseClass: 'pulse-border-default' }
        };

        const PRIORITY_HEX = {
            [PRIORITIES.HIGH]:   '#f87171',
            [PRIORITIES.MEDIUM]: '#fbbf24',
            [PRIORITIES.LOW]:    '#38bdf8',
            null:                '#94a3b8',
        };

        const THEMES = {
            slate:  { bg: '#0f172a', surface: '#1e293b', surface2: '#273346', border: '#334155', textPrimary: '#f1f5f9', textMuted: '#94a3b8' },
            void:   { bg: '#050505', surface: '#111111', surface2: '#1a1a1a', border: '#222222', textPrimary: '#f1f5f9', textMuted: '#9ca3af' },
            ember:  { bg: '#120a06', surface: '#1c1008', surface2: '#2d1a0a', border: '#3d2510', textPrimary: '#fef3c7', textMuted: '#d97706' },
            forest: { bg: '#061209', surface: '#0d1f12', surface2: '#1a3320', border: '#1f4a27', textPrimary: '#f0fdf4', textMuted: '#86efac' },
            aurora: { bg: '#08091a', surface: '#12133a', surface2: '#1e1f5e', border: '#2d2f7a', textPrimary: '#f5f3ff', textMuted: '#a78bfa' },
        };

        const FONTS = {
            inter:           { family: "'Inter', ui-sans-serif, system-ui", googleUrl: null },
            jetbrains:       { family: "'JetBrains Mono', monospace",       googleUrl: 'https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap' },
            'space-grotesk': { family: "'Space Grotesk', sans-serif",       googleUrl: 'https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap' },
            'dm-sans':       { family: "'DM Sans', sans-serif",             googleUrl: 'https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&display=swap' },
            sora:            { family: "'Sora', sans-serif",                googleUrl: 'https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&display=swap' },
        };

        const PRIORITY_TITLE_TO_CONSTANT_MAP = Object.fromEntries(
            Object.values(PRIORITIES).map(p => [PRIORITY_CONFIG[p]?.title, p]).filter(([t]) => t)
        );

        const TASK_STATUS = { TO_DO: 'To Do', DONE: 'Completed' };

        const TASK_STATUS_CONFIG = {
            [TASK_STATUS.TO_DO]: {
                label: 'To Do',
                selectBgColor: 'bg-sky-900/50',
                accentClass: 'bg-sky-400',
                glowClass: 'shadow-[0_0_15px_-4px_rgba(56,189,248,0.5)] hover:shadow-[0_0_18px_-3px_rgba(56,189,248,0.7)]'
            },
            [TASK_STATUS.DONE]: {
                label: 'Completed',
                selectBgColor: 'bg-green-900/50',
                accentClass: 'bg-green-500',
                glowClass: 'shadow-[0_0_12px_-5px_rgba(34,197,94,0.5)]'
            }
        };

        const TASK_SIZES = {
            F1:       'F1 (S)',
            F9:       'F9 (M)',
            FH:       'FH (L)',
            STARSHIP: 'Starship (XL)',
        };

        const TIMEZONES = [
            { value: 'America/New_York',    label: 'EST' },
            { value: 'America/Chicago',     label: 'CST' },
            { value: 'America/Denver',      label: 'MST' },
            { value: 'America/Los_Angeles', label: 'PST' },
            { value: 'UTC',                 label: 'UTC' },
        ];

        const DISPLAY_PRIORITY_ORDER = [PRIORITIES.LOW, PRIORITIES.MEDIUM, PRIORITIES.HIGH];

        const CONFETTI_COLORS = ['#FBBF24', '#38BDF8', '#F87171', '#34D399'];

        // Tag/project color palettes (used by hashColor utility)
        const TAG_COLORS = [
            'bg-red-900/70 text-red-300',
            'bg-yellow-900/70 text-yellow-300',
            'bg-green-900/70 text-green-300',
            'bg-blue-900/70 text-blue-300',
            'bg-indigo-900/70 text-indigo-300',
            'bg-purple-900/70 text-purple-300',
            'bg-pink-900/70 text-pink-300',
        ];

        const PROJECT_BG_COLORS = [
            'bg-red-900/20', 'bg-yellow-900/20', 'bg-green-900/20', 'bg-blue-900/20',
            'bg-indigo-900/20', 'bg-purple-900/20', 'bg-pink-900/20', 'bg-slate-900/20',
        ];


        // ─── 2. UTILITIES ────────────────────────────────────────────────────

        // --- Priority sort ---
        const getPrioritySortValue = (priority) => {
            if (priority === PRIORITIES.HIGH)   return 0;
            if (priority === PRIORITIES.MEDIUM) return 1;
            if (priority === PRIORITIES.LOW)    return 2;
            return 3;
        };

        // --- Audio ---
        let audioContext = null;
        const getAudioContext = () => {
            if (!audioContext && (window.AudioContext || window.webkitAudioContext)) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
            return audioContext;
        };

        const playTaiko = (type = 'DON', volume = 0.3) => {
            const actx = getAudioContext();
            if (!actx || actx.state === 'suspended') return;
            const now = actx.currentTime;
            const mainGain = actx.createGain();
            mainGain.connect(actx.destination);

            if (type === 'DON') {
                const osc = actx.createOscillator(), gain = actx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(80, now);
                osc.frequency.exponentialRampToValueAtTime(40, now + 0.4);
                gain.gain.setValueAtTime(volume * 1.5, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.8);
                osc.connect(gain); gain.connect(mainGain);
                osc.start(now); osc.stop(now + 0.8);

                const snap = actx.createOscillator(), snapGain = actx.createGain();
                snap.type = 'triangle';
                snap.frequency.setValueAtTime(150, now);
                snapGain.gain.setValueAtTime(volume * 0.5, now);
                snapGain.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
                snap.connect(snapGain); snapGain.connect(mainGain);
                snap.start(now); snap.stop(now + 0.05);
            } else if (type === 'KA') {
                const osc = actx.createOscillator(), gain = actx.createGain();
                osc.type = 'square';
                osc.frequency.setValueAtTime(800, now);
                osc.frequency.exponentialRampToValueAtTime(400, now + 0.1);
                gain.gain.setValueAtTime(volume * 0.5, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
                osc.connect(gain); gain.connect(mainGain);
                osc.start(now); osc.stop(now + 0.15);
            } else if (type === 'TICK') {
                const osc = actx.createOscillator(), gain = actx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(1200, now);
                gain.gain.setValueAtTime(volume * 0.2, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.03);
                osc.connect(gain); gain.connect(mainGain);
                osc.start(now); osc.stop(now + 0.03);
            }
        };

        const playTone = (frequency, duration = 0.5, type = 'sine', volume = 0.3) => {
            const actx = getAudioContext();
            if (!actx || actx.state === 'suspended') return;
            const oscillator = actx.createOscillator(), gainNode = actx.createGain();
            oscillator.type = type;
            oscillator.frequency.setValueAtTime(frequency, actx.currentTime);
            gainNode.gain.setValueAtTime(volume, actx.currentTime);
            gainNode.gain.linearRampToValueAtTime(0.0001, actx.currentTime + duration);
            oscillator.connect(gainNode); gainNode.connect(actx.destination);
            oscillator.start(); oscillator.stop(actx.currentTime + duration);
        };

        // --- Color hashing (module-level cache avoids recomputing on every render) ---
        const _colorCache = new Map();
        const hashColor = (str, palette) => {
            const key = `${str}:${palette.length}`;
            if (!_colorCache.has(key)) {
                const h = str.split('').reduce((acc, c) => c.charCodeAt(0) + ((acc << 5) - acc), 0);
                _colorCache.set(key, palette[Math.abs(h % palette.length)]);
            }
            return _colorCache.get(key);
        };
        const getTagColor     = (tag)  => hashColor(tag,  TAG_COLORS);
        const getProjectColor = (name) => hashColor(name, PROJECT_BG_COLORS);

        // --- Circular dependency detection ---
        // Returns true if `fromId` has `toId` somewhere in its dependency chain (directly or transitively).
        const hasDependency = (fromId, toId, tasks) => {
            const visited = new Set();
            const check = (id) => {
                if (visited.has(id)) return false;
                visited.add(id);
                const task = tasks.find(t => t.id === id);
                if (!task || !task.dependsOn || task.dependsOn.length === 0) return false;
                if (task.dependsOn.includes(toId)) return true;
                return task.dependsOn.some(depId => check(depId));
            };
            return check(fromId);
        };

        // --- Time parsing ---
        const parseHHMMSSDuration = (inputStr) => {
            if (!inputStr || typeof inputStr !== 'string') return null;
            const parts = inputStr.split(':').map(p => p.trim());
            let h = 0, m = 0, s = 0, ok = false;

            if (parts.length === 1) {
                const v = parseInt(parts[0], 10);
                if (!isNaN(v) && String(v) === parts[0]) { s = v; ok = true; }
            } else if (parts.length === 2) {
                const vm = parseInt(parts[0], 10), vs = parseInt(parts[1], 10);
                if (!isNaN(vm) && String(vm) === parts[0] && !isNaN(vs) && String(vs) === parts[1]) {
                    m = vm; s = vs; ok = true;
                }
            }
            if (!ok) return null;
            if (s >= 60) { m += Math.floor(s / 60); s %= 60; }
            if (m >= 60) { h += Math.floor(m / 60); m %= 60; }
            const total = h * 3600 + m * 60 + s;
            return total > 0 ? total : null;
        };


        // ─── 3. DESIGN SYSTEM ────────────────────────────────────────────────

        const BTN = {
            primary:   'px-4 py-2 bg-sky-600 text-white font-semibold rounded-lg hover:bg-sky-500 transition-colors disabled:opacity-50 disabled:cursor-not-allowed',
            secondary: 'px-4 py-2 bg-slate-600 text-white font-semibold rounded-lg hover:bg-slate-500 transition-colors',
            ghost:     'px-3 py-1.5 text-slate-400 hover:text-white hover:bg-slate-700 rounded-md transition-colors',
            danger:    'px-4 py-2 bg-red-600 text-white font-semibold rounded-lg hover:bg-red-500 transition-colors',
            success:   'px-4 py-2 bg-green-600 text-white font-semibold rounded-lg hover:bg-green-500 transition-colors',
            tag:       'px-2 py-0.5 text-sky-300 bg-sky-600/30 hover:bg-sky-600/50 border border-sky-600/80 rounded-md transition-colors text-xs font-medium',
        };

        const Btn = React.memo(({ variant = 'primary', className = '', ...props }) => (
            <button className={`${BTN[variant]} ${className}`} {...props} />
        ));

        const SectionLabel = ({ children, className = '' }) => (
            <h4 className={`text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2 ${className}`}>{children}</h4>
        );

        const Panel = ({ children, className = '' }) => (
            <div className={`bg-slate-900/40 p-4 rounded-lg border border-slate-700/50 ${className}`}>{children}</div>
        );

        // Standard modal shell: backdrop + card + header + scrollable body
        const ModalShell = ({ title, onClose, children, maxWidth = 'max-w-lg', headerActions }) => (
            <Modal onClose={onClose}>
                <div className={`rounded-xl shadow-2xl w-full ${maxWidth} flex flex-col max-h-[90vh]`} style={{ background: 'var(--surface)', border: '1px solid var(--border)' }} onClick={e => e.stopPropagation()}>
                    <div className="flex justify-between items-center p-5 border-b flex-shrink-0" style={{ borderColor: 'var(--border)' }}>
                        <h3 className="text-xl font-bold" style={{ color: 'var(--text-primary)' }}>{title}</h3>
                        <div className="flex items-center gap-2">
                            {headerActions}
                            <Btn variant="ghost" onClick={onClose} className="p-1.5 rounded-full">
                                <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
                            </Btn>
                        </div>
                    </div>
                    <div className="p-5 overflow-y-auto flex-1">{children}</div>
                </div>
            </Modal>
        );


        // ─── 4. APP CONTEXT ──────────────────────────────────────────────────

        const AppContext = createContext(null);

        const AppProvider = ({ children }) => {
            const [tasks, setTasks]                       = useState([]);
            const [projectSettings, setProjectSettings]   = useState({});
            const [settings, setSettings]                 = useState({ confirmOnDelete: true });
            const [taskToDelete, setTaskToDelete]         = useState(null);
            const [selectedTaskId, setSelectedTaskId]     = useState(null);
            const [activeTags, setActiveTags]             = useState([]);
            const [collapsedProjects, setCollapsedProjects] = useState({ 'Completed': true });
            const [searchQuery, setSearchQuery]           = useState('');
            const [importConfirmation, setImportConfirmation] = useState({ show: false, data: null, taskCount: 0 });

            const appId = 'taiko-app-local';

            const processImportedData = useCallback((data) => {
                const isMinimal = !data.tasks && data.t;
                const taskData  = isMinimal ? data.t : data.tasks;

                if (taskData) {
                    let processedTasks = [];
                    if (isMinimal) {
                        processedTasks = taskData.map(t => ({
                            title:           t[0],
                            priority:        t[1],
                            tags:            t[2],
                            checklist:       t[3] ? t[3].map(i => ({ id: crypto.randomUUID(), text: i[0], completed: i[1] === 1 })) : [],
                            project:         t[4] || null,
                            id:              t[5] || crypto.randomUUID(),
                            notes:           t[6] || '',
                            dueDate:         t[7] || null,
                            size:            t[8] || null,
                            dependsOn:       t[9] || [],
                            status:          t[10] || TASK_STATUS.TO_DO,
                            timeSpentSeconds: t[11] || 0,
                            created:         new Date().toISOString(),
                            activityLog:     [{ message: 'Imported via shortlink', timestamp: new Date().toISOString() }]
                        }));
                    } else {

                            activityLog: t.activityLog || [{ message: 'Imported via shortlink', timestamp: new Date().toISOString() }],
                            checklist:   t.checklist || [],
                            tags:        t.tags || [],
                            dependsOn:   t.dependsOn || []
                        }));

                    const importedIds = new Set(processedTasks.map(t => t.id));
                    processedTasks = processedTasks.map(t => ({
                        ...t,
                        dependsOn: (t.dependsOn || []).filter(id => importedIds.has(id))
                    }));
                    setTasks(processedTasks);
                }

                const settingsData  = data.settings || data.s;
                if (settingsData)  setSettings(settingsData);
                const projData      = data.projectSettings || data.p;
                if (projData)      setProjectSettings(projData);
                const collapsedData = data.collapsedProjects || data.c;

                window.history.replaceState(null, null, window.location.pathname);

                        const decompressed = LZString.decompressFromEncodedURIComponent(compressed);
                        if (decompressed) {
                            const data = JSON.parse(decompressed);
                            const isMinimal = !data.tasks && data.t;
                            const taskData  = isMinimal ? data.t : data.tasks;
                            if (taskData) {
                                setImportConfirmation({ show: true, data, taskCount: taskData.length });
                            }
                        }

                        console.error("Failed to process share link:", e);
                        alert("Invalid or corrupted share link.");
                    }

                        (!Object.keys(TASK_SIZES).includes(t.size) && t.size !== null) || !t.dependsOn
                    );

                            createdAt:   t.createdAt || t.timestamp,

            const blendTowardWhite = (hex, fraction) => {
                const h = hex.replace('#', '');
                const r = parseInt(h.slice(0,2), 16);
                const g = parseInt(h.slice(2,4), 16);
                const b = parseInt(h.slice(4,6), 16);
                const blend = (c) => Math.round(c + (255 - c) * fraction).toString(16).padStart(2,'0');
                return `#${blend(r)}${blend(g)}${blend(b)}`;
            };

                const fontName  = settings.font  || 'inter';
                const customSurface = settings.customTheme?.surface || '#1e293b';

                    ? {
                        bg:          settings.customTheme?.bg      || '#0f172a',
                        surface:     customSurface,
                        surface2:    blendTowardWhite(customSurface, 0.06),
                        border:      blendTowardWhite(customSurface, 0.12),
                        textPrimary: '#f1f5f9',
                        textMuted:   '#94a3b8',
                      }
                    : (THEMES[themeName] || THEMES.slate);
                const f = FONTS[fontName] || FONTS.inter;

                // Load Google Font if needed
                if (f.googleUrl && !document.querySelector(`link[href="${f.googleUrl}"]`)) {
                    const link = document.createElement('link');
                    link.rel  = 'stylesheet';
                    link.href = f.googleUrl;
                    document.head.appendChild(link);
                }

                let styleEl = document.getElementById('taiko-theme');
                if (!styleEl) {
                    styleEl = document.createElement('style');
                    styleEl.id = 'taiko-theme';
                    document.head.appendChild(styleEl);
                }
                styleEl.textContent = `
                    :root {
                        --bg: ${t.bg};
                        --surface: ${t.surface};
                        --surface-2: ${t.surface2};
                        --border: ${t.border};
                        --text-primary: ${t.textPrimary};
                        --text-muted: ${t.textMuted};
                        --font-family: ${f.family};
                    }
                    html, body { background-color: var(--bg) !important; font-family: var(--font-family) !important; }

            // --- Persist to localStorage ---
            useEffect(() => {

                        const oldP = PRIORITY_CONFIG[task.priority]?.title || 'none';

                        newLog.push({ message: `Priority changed from ${oldP} to ${newP}.`, timestamp: now });

                    setImportConfirmation({ show: true, data, taskCount: taskData ? taskData.length : 0 });
                    return true;
                } catch (error) {
                    alert("Failed to parse data. Invalid JSON format.");

                catch { return false; }

                settings, setSettings, allProjects, projectSettings,
                taskToDelete, setTaskToDelete,
                activeTags, setActiveTags,
                selectedTaskId, setSelectedTaskId,
                collapsedProjects, toggleProjectCollapse,
                searchQuery, setSearchQuery,
                exportData, importData, generateShortLink, processImportedData, initiateImport,
                importConfirmation, setImportConfirmation
            }), [
                tasks, updateTask, addTask, deleteTask, deleteAllCompletedTasks, renameProject, deleteProject, updateProjectSetting,
                settings, setSettings, allProjects, projectSettings,
                taskToDelete, setTaskToDelete,
                activeTags, setActiveTags, selectedTaskId,
                collapsedProjects, toggleProjectCollapse,
                searchQuery, exportData, importData, generateShortLink, processImportedData, initiateImport,
                importConfirmation
            ]);

            return <AppContext.Provider value={contextValue}>{children}</AppContext.Provider>;
        };

            return ref.current;
