            } = useAppContext();

            const [showDeleteAllCompletedModal, setShowDeleteAllCompletedModal] = useState(false);
            const [showSummaryModal,  setShowSummaryModal]  = useState(false);
            const [summaryText,       setSummaryText]        = useState('');
            const [clockTimezone,     setClockTimezone]      = useState(Intl.DateTimeFormat().resolvedOptions().timeZone);
            const [showNewProjectModal, setShowNewProjectModal] = useState(false);
            const [showGraphModal,    setShowGraphModal]     = useState(false);
            const [showSettings,      setShowSettings]       = useState(false);
            const [showReleaseNotes,  setShowReleaseNotes]   = useState(false);
            const [selectedProjectName, setSelectedProjectName] = useState(null);
            const [taskToComplete,    setTaskToComplete]     = useState(null);
            const [showMobileSidebar, setShowMobileSidebar]  = useState(false);
            const [showAddTaskModal,  setShowAddTaskModal]   = useState(false);
            const [showShortLinkModal, setShowShortLinkModal] = useState(false);
            const [shortLinkUrl,      setShortLinkUrl]       = useState('');
            const now         = useNow(60000);
            const windowWidth = useWindowWidth();

            // Show release notes once per version
            useEffect(() => {
                if (localStorage.getItem('taiko-app-local-lastSeenVersion') !== CURRENT_APP_VERSION) {
                    setShowReleaseNotes(true);
                }
            }, []);

            const isSmallScreen          = windowWidth < 768;
            const showDetailViewOnMobile = isSmallScreen && (selectedTaskId || selectedProjectName);
            const showListViewOnMobile   = isSmallScreen && !showDetailViewOnMobile;

            // Body lock
            useEffect(() => {
                const locked = showMobileSidebar || showSettings || showGraphModal || showAddTaskModal ||
                               showSummaryModal || showShortLinkModal || showDeleteAllCompletedModal ||
                               taskToDelete || taskToComplete;
                document.body.classList.toggle('body-lock', !!locked);
            }, [showMobileSidebar, showSettings, showGraphModal, showAddTaskModal, showSummaryModal, showShortLinkModal, showDeleteAllCompletedModal, taskToDelete, taskToComplete]);

            // Keyboard shortcuts
            useEffect(() => {
                const handler = (e) => {
                    if (['INPUT', 'TEXTAREA'].includes(e.target.tagName)) return;
                    if (e.key.toLowerCase() === 'd' && selectedTaskId) {
                        e.preventDefault();
                        if (settings.confirmOnDelete) setTaskToDelete(selectedTaskId);
                        else deleteTask(selectedTaskId);
                    }
                    if (e.key.toLowerCase() === 'c' && selectedTaskId) {
                        e.preventDefault();
                        const task = tasks.find(t => t.id === selectedTaskId);
                        if (task && task.status !== TASK_STATUS.DONE) setTaskToComplete(task);
                    }
                };
                window.addEventListener('keydown', handler);
                return () => window.removeEventListener('keydown', handler);
            }, [selectedTaskId, settings.confirmOnDelete, setTaskToDelete, deleteTask, tasks]);

            // Reminder notifications
            useEffect(() => {
                tasks.forEach(task => {
                    if (task.reminderAt && !task.reminderFired && task.status !== TASK_STATUS.DONE && new Date(task.reminderAt) <= now) {
                        updateTask(task.id, { reminderFired: true });
                    }
                });
            }, [tasks, now, updateTask]);

            const activeTasksCount    = useMemo(() => tasks.filter(t => t.status !== TASK_STATUS.DONE).length, [tasks]);
            const completedTasksCount = useMemo(() => tasks.filter(t => t.status === TASK_STATUS.DONE).length, [tasks]);

            const priorityFilterCounts = useMemo(() => {
                const counts = {};
                DISPLAY_PRIORITY_ORDER.forEach(p => {
                    counts[PRIORITY_CONFIG[p].title] = tasks.filter(t => t.status !== TASK_STATUS.DONE && t.priority === p).length;
                });
                return counts;
            }, [tasks]);

            const customTagFilterCounts = useMemo(() => {
                const counts = {};
                const active = tasks.filter(t => t.status !== TASK_STATUS.DONE);
                allProjects.forEach(p => { counts[p] = active.filter(t => t.project === p).length; });
                return counts;
            }, [tasks, allProjects]);

            const tasksMatchingActiveFilters = useMemo(() => {
                let filtered = tasks;
                if (searchQuery.trim()) {
                    const q = searchQuery.toLowerCase();
                    filtered = filtered.filter(t =>
                        t.title.toLowerCase().includes(q) ||
                        (t.notes && t.notes.toLowerCase().includes(q)) ||
                        (t.tags && t.tags.some(tag => tag.toLowerCase().includes(q)))
                    );
                }
                if (!activeTags.length) return filtered;
                return filtered.filter(t =>
                    activeTags.some(tag => {
                        const pConst = PRIORITY_TITLE_TO_CONSTANT_MAP[tag];
                        return pConst ? t.priority === pConst : t.project === tag;
                    })
                );
            }, [tasks, activeTags, searchQuery]);

            const selectedTask = useMemo(() => tasks.find(t => t.id === selectedTaskId), [tasks, selectedTaskId]);

            const tasksForProjectView = useMemo(() => {
                if (!selectedProjectName) return [];
                if (selectedProjectName === 'Completed') return tasks.filter(t => t.status === TASK_STATUS.DONE).sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
                return tasks.filter(t => (t.project || 'Unassigned') === selectedProjectName && t.status !== TASK_STATUS.DONE)
                    .sort((a, b) => getPrioritySortValue(a.priority) - getPrioritySortValue(b.priority));
            }, [tasks, selectedProjectName]);

            const handleConfirmDelete = useCallback(() => {
                if (!taskToDelete) return;
                deleteTask(taskToDelete);
                setTaskToDelete(null);
            }, [taskToDelete, deleteTask]);

            const handleConfirmComplete = useCallback(() => {
                if (!taskToComplete) return;
                updateTask(taskToComplete.id, { status: TASK_STATUS.DONE, reminderAt: null, reminderFired: false });
                setTaskToComplete(null);
            }, [taskToComplete, updateTask]);

            const handleCreateProject = (name) => {
                if (name?.trim()) { const t = addTask('New Task', name.trim()); setSelectedTaskId(t.id); setSelectedProjectName(null); }
                setShowNewProjectModal(false);
            };

            const handleAddTaskFromModal = ({ title, priority }) => {
                const t = addTask(title, null, priority);
                setSelectedTaskId(t.id); setSelectedProjectName(null); setShowAddTaskModal(false);
            };

            const handleGenerateShortLink = useCallback(() => {
                const url = generateShortLink();
                if (url) { setShortLinkUrl(url); setShowShortLinkModal(true); }
                else alert("Failed to generate link. Data might be too large.");
            }, [generateShortLink]);

            const handleConfirmDeleteAllCompleted = useCallback(() => {
                deleteAllCompletedTasks(); setShowDeleteAllCompletedModal(false);
            }, [deleteAllCompletedTasks]);

            const generateCompletedTasksSummary = useCallback(() => {
                const fmtTime = (ds) => new Date(ds).toLocaleString('en-US', { year: 'numeric', month: 'numeric', day: 'numeric', hour: 'numeric', minute: '2-digit', timeZone: clockTimezone });
                let s = `Taiko Task Summary\n   Generated: ${fmtTime(new Date())} (${TIMEZONES.find(tz => tz.value === clockTimezone)?.label || clockTimezone})\n\n`;

                if (!tasks.length) { s += "No tasks to summarize."; setSummaryText(s); setShowSummaryModal(true); return; }

                const groupByProject = (ts) => Object.entries(ts.reduce((acc, t) => { const p = t.project || 'Unassigned'; if (!acc[p]) acc[p] = []; acc[p].push(t); return acc; }, {})).sort(([a], [b]) => a.localeCompare(b));

                const buildSection = (title, ts, isCompleted = false) => {
                    let txt = `${title} (${ts.length})\n`;
                    if (!ts.length) { txt += `   └─ No tasks in this section.\n`; return txt; }
                    groupByProject(ts).forEach(([proj, pTasks], pi, all) => {
                        const isLastProj = pi === all.length - 1;
                        txt += `${isLastProj ? '└─' : '├─'} ${proj} (${pTasks.length})\n`;
                        pTasks.forEach((task, ti) => {
                            const isLastTask = ti === pTasks.length - 1;
                            const pIndent = isLastProj ? '   ' : '│  ';
                            const upstream = (task.dependsOn || []).map(id => tasks.find(t => t.id === id)).filter(t => t && t.status !== TASK_STATUS.DONE);
                            let line = `${pIndent}${isLastTask ? '└─' : '├─'} ${isCompleted ? '☑' : '☐'} ${task.title}`;
                            if (upstream.length) line += ` [Blocked by: ${upstream.map(t => t.title).join(', ')}]`;
                            if (isCompleted) line += ` (Completed: ${fmtTime(task.timestamp)})`;
                            txt += `${line}\n`;
                            const indent = `${pIndent}${isLastTask ? '   ' : '│  '}`;
                            if (task.notes?.trim()) txt += `${indent}${task.checklist?.length ? '├─' : '└─'} Notes: ${task.notes.trim().replace(/\n/g, `\n${indent}   `)}\n`;
                            (task.checklist || []).forEach((item, ii) => {
                                const isLastItem = ii === task.checklist.length - 1;
                                let il = `${indent}${isLastItem ? '└─' : '├─'} ${item.completed ? '☑' : '☐'} ${item.text}`;
                                if (item.completed && item.completedAt) il += ` (Completed: ${fmtTime(item.completedAt)})`;
                                txt += `${il}\n`;
                            });
                        });
                    });
                    return txt;
                };

                s += buildSection('In Progress', tasks.filter(t => t.status !== TASK_STATUS.DONE).sort((a, b) => getPrioritySortValue(a.priority) - getPrioritySortValue(b.priority)));
                s += '\n';
                s += buildSection('Completed', tasks.filter(t => t.status === TASK_STATUS.DONE).sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp)), true);
                setSummaryText(s); setShowSummaryModal(true);
            }, [tasks, clockTimezone]);

            const handleTagFilterClick = (tag) => setActiveTags(prev => (prev.length === 1 && prev[0] === tag) ? [] : [tag]);
            const handleProjectHeaderClick = (name) => { setSelectedProjectName(name); setSelectedTaskId(null); };
            const handleCloseReleaseNotes  = () => { setShowReleaseNotes(false); localStorage.setItem('taiko-app-local-lastSeenVersion', CURRENT_APP_VERSION); };

            return (
                <div className="h-[100dvh] w-screen font-sans flex flex-col overflow-hidden" style={{ background: 'transparent' }}>
                    {/* Modals */}
                    {taskToDelete      && <DeleteConfirmationModal onConfirm={handleConfirmDelete} onCancel={() => setTaskToDelete(null)} />}
                    {taskToComplete    && <CompleteConfirmationModal onConfirm={handleConfirmComplete} onCancel={() => setTaskToComplete(null)} taskTitle={taskToComplete.title} />}
                    {showDeleteAllCompletedModal && <DeleteAllCompletedModal onConfirm={handleConfirmDeleteAllCompleted} onCancel={() => setShowDeleteAllCompletedModal(false)} count={completedTasksCount} />}
                    {showSummaryModal  && <SummaryModal summary={summaryText} onClose={() => setShowSummaryModal(false)} />}
                    {showReleaseNotes  && <ReleaseNotesModal version={CURRENT_APP_VERSION} onClose={handleCloseReleaseNotes} />}
                    {showNewProjectModal && <NewProjectModal onAdd={handleCreateProject} onCancel={() => setShowNewProjectModal(false)} />}
                    {showSettings      && <SettingsModal settings={settings} onSettingsChange={setSettings} onClose={() => setShowSettings(false)} />}
                    {showAddTaskModal  && <AddTaskModal onAdd={handleAddTaskFromModal} onCancel={() => setShowAddTaskModal(false)} />}
                    {showShortLinkModal && <ShortLinkModal url={shortLinkUrl} onClose={() => setShowShortLinkModal(false)} />}
                    {showGraphModal    && <DependencyGraphModal onClose={() => setShowGraphModal(false)} />}
                    {importConfirmation.show && (
                        <ImportModal
                            data={importConfirmation.data} taskCount={importConfirmation.taskCount}
                            onConfirm={() => { processImportedData(importConfirmation.data); setImportConfirmation({ show: false, data: null, taskCount: 0 }); }}
                            onCancel={() => { setImportConfirmation({ show: false, data: null, taskCount: 0 }); window.history.replaceState(null, null, window.location.pathname); }}
                        />
                    )}

                    {/* Header */}
                    <header className="sticky top-0 z-20 px-4 flex items-center justify-between bg-black/90 backdrop-blur-xl shadow-2xl shadow-black/40 border-b border-white/10 h-16 md:h-20 flex-shrink-0">
                        <div className="flex items-center gap-4 h-full">
                            <div
                                className={`flex items-center gap-3 h-full min-w-0 ${(selectedTaskId || selectedProjectName) ? 'cursor-pointer hover:opacity-80 transition-all active:scale-95' : ''}`}
                                onClick={() => { if (selectedTaskId || selectedProjectName) { playTaiko('DON', 0.2); setSelectedTaskId(null); setSelectedProjectName(null); } }}
                            >
                                <div className="flex-shrink-0 w-12 h-12 flex items-center justify-center">
                                    <div className="scale-75 md:scale-100 transition-transform origin-center flex items-center justify-center"><TaikoLogo /></div>
                                </div>
                                <h1 className="text-xl md:text-3xl font-bold tracking-[0.2em] text-[#E0E7FF] uppercase select-none truncate py-2 flex items-center">Taiko</h1>
                            </div>
                            <div className="hidden md:flex items-center gap-2">
                                <HeaderToolbar
                                    isSmallScreen={isSmallScreen}
                                    onShowSettings={() => setShowSettings(true)}
                                    onGenerateSummary={generateCompletedTasksSummary}
                                    onShowDeleteAllModal={() => setShowDeleteAllCompletedModal(true)}
                                    showDeleteAllButton={completedTasksCount > 0}
                                    onGenerateShortLink={handleGenerateShortLink}
                                    onShowGraph={() => setShowGraphModal(true)}
                                />
                            </div>
                        </div>
                        <div className="hidden sm:flex items-center ml-auto">
                            <LiveClock timezone={clockTimezone} onTimezoneChange={tz => setClockTimezone(tz)} />
                        </div>
                    </header>

                    {/* Filter bar */}
                    <div className={`hidden md:flex px-4 py-2 flex-shrink-0 border-b border-slate-800 justify-between items-center flex-wrap gap-4 ${showDetailViewOnMobile ? 'hidden' : ''}`}>
                        <FilterToolbar
                            activeTasksCount={activeTasksCount} completedTasksCount={completedTasksCount}
                            activeTags={activeTags} priorityFilterCounts={priorityFilterCounts}
                            tagsForCurrentView={allProjects} customTagFilterCounts={customTagFilterCounts}
                            onShowNewProjectModal={() => setShowNewProjectModal(true)}
                            onClearFilters={() => setActiveTags([])} onTagFilterClick={handleTagFilterClick}
                            searchQuery={searchQuery} setSearchQuery={setSearchQuery}
                        />
                    </div>

                    {/* Main content */}
                    <main className="flex-grow p-4 flex flex-col md:flex-row gap-4 overflow-hidden">
                        {/* Task list pane */}
                        <div className={`w-full md:w-1/3 flex-shrink-0 overflow-y-auto pr-2 scroll-container ${isSmallScreen ? 'mobile-scroll-padding' : ''} ${showDetailViewOnMobile ? 'hidden' : ''}`}>
                            <TaskList
                                tasks={tasksMatchingActiveFilters}
                                selectedTaskId={selectedTaskId}
                                onSelectTask={(id) => { setSelectedTaskId(id); setSelectedProjectName(null); }}
                                onProjectHeaderClick={handleProjectHeaderClick}
                                selectedProjectName={selectedProjectName}
                                onShowDeleteAllModal={() => setShowDeleteAllCompletedModal(true)}
                                onAddTask={(projectName) => {
                                    const t = addTask('', projectName);
                                    setSelectedTaskId(t.id); setSelectedProjectName(null);
                                    if (collapsedProjects[projectName]) toggleProjectCollapse(projectName);
                                }}
                                completedTasksCount={completedTasksCount}
                            />
                        </div>

                        {/* Detail pane */}
                        <div className={`w-full md:w-2/3 flex-grow overflow-y-auto scroll-container ${isSmallScreen ? 'mobile-scroll-padding' : ''} ${showListViewOnMobile ? 'hidden' : ''}`}>
                            {selectedProjectName ? (
                                <div className="space-y-4">
                                    {tasksForProjectView.length > 0
                                        ? tasksForProjectView.map(task =>
                                            <MemoizedTaskCard key={task.id} task={task} clockTimezone={clockTimezone} isDetailedView={false} onSelect={(id) => { setSelectedTaskId(id); setSelectedProjectName(null); }} />
                                          )
                                        : <p className="text-slate-500 px-2">No tasks in this project.</p>
                                    }
                                </div>
                            ) : selectedTask ? (
                                <MemoizedTaskCard
                                    key={selectedTask.id} task={selectedTask} clockTimezone={clockTimezone}
                                    startInEditMode={selectedTask.id === selectedTaskId && selectedTask.title === ''}
                                    isDetailedView={true}
                                    onSelect={(id) => { setSelectedTaskId(id); setSelectedProjectName(null); }}
                                />
                            ) : (
                                <div className="h-full flex items-center justify-center text-slate-500 text-xl">
                                    Select a task or project to see details
                                </div>
                            )}
                        </div>
                    </main>

                    <Footer onShowReleaseNotes={() => setShowReleaseNotes(true)} />

                    <MobileBottomNav
                        showDetailViewOnMobile={showDetailViewOnMobile}
                        onBack={() => { playTaiko('DON', 0.2); setSelectedTaskId(null); setSelectedProjectName(null); }}
                        onAdd={() => setShowAddTaskModal(true)}
                        onSettings={() => setShowSettings(true)}
                        onOpenSidebar={() => setShowMobileSidebar(true)}
                    />
                    <MobileSidebar
                        isOpen={showMobileSidebar} onClose={() => setShowMobileSidebar(false)}
                        clockTimezone={clockTimezone} handleTimezoneChange={tz => setClockTimezone(tz)}
                        searchQuery={searchQuery} setSearchQuery={setSearchQuery}
                        activeTags={activeTags} onTagFilterClick={handleTagFilterClick}
                        onClearFilters={() => setActiveTags([])} tagsForCurrentView={allProjects}
                        customTagFilterCounts={customTagFilterCounts} activeTasksCount={activeTasksCount}
                        priorityFilterCounts={priorityFilterCounts}
                        onShowNewProjectModal={() => setShowNewProjectModal(true)}
                        onShowGraph={() => setShowGraphModal(true)}
                        onShowSettings={() => setShowSettings(true)}
                        onGenerateSummary={generateCompletedTasksSummary}
                        onGenerateShortLink={handleGenerateShortLink}
                        completedTasksCount={completedTasksCount}
                        onShowDeleteAllModal={() => setShowDeleteAllCompletedModal(true)}
                    />
                </div>
            );
        };

        const TaikoApp = () => (
            <AppProvider>
                <App />
            </AppProvider>
        );

        ReactDOM.createRoot(document.getElementById('root')).render(<TaikoApp />);

    </script>
</body>
</html>
