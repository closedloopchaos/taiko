                };
                if (startTime) animate();
                else setElapsed(fmt(totalElapsedSeconds || 0));
                return () => { alive = false; cancelAnimationFrame(frameRef.current); };
            }, [startTime, totalElapsedSeconds, fmt]);

            return <span className="text-sm font-mono bg-slate-700/50 text-amber-300 px-2 py-1 rounded">{elapsed}</span>;
        });

        const ReminderCountdown = React.memo(({ reminderAt }) => {
            const now = useNow();
            const [countdown, setCountdown] = useState('');

            const fmt = useCallback((ms) => {
                if (ms <= 0) return 'Due!';
                const s = Math.max(0, Math.floor(ms / 1000));
                return `${String(Math.floor(s / 3600)).padStart(2,'0')}:${String(Math.floor((s % 3600) / 60)).padStart(2,'0')}:${String(s % 60).padStart(2,'0')}`;
            }, []);

            useEffect(() => {
                if (!reminderAt) { setCountdown(''); return; }
                setCountdown(fmt(new Date(reminderAt).getTime() - now.getTime()));
            }, [reminderAt, now, fmt]);

            if (!reminderAt || !countdown) return null;
            return <div className="text-xs text-cyan-300 font-mono">Countdown: {countdown}</div>;
        });


        // ─── 8. TASK CARD SUB-COMPONENTS ─────────────────────────────────────

        // ChecklistItem lives here since it's only used by TaskChecklist
        const ChecklistItem = React.memo(({ item, onUpdate, onDelete, onAddNewItemAfter, isFocused, onFocusHandled, isLocked, onDropItem, onDragEndItem, clockTimezone }) => {
            const inputRef   = useRef(null);
            const [isDragOver, setIsDragOver] = useState(false);
            const [text, setText]             = useState(item.text);

            useEffect(() => { if (isFocused && inputRef.current) { inputRef.current.focus(); onFocusHandled(); } }, [isFocused, onFocusHandled]);
            useEffect(() => { setText(item.text); }, [item.text]);

            const handleBlur = () => {
                const trimmed = text.trim();
                if (trimmed === '') onDelete(item.id);
                else if (trimmed !== item.text) onUpdate(item.id, { text: trimmed });
            };
            const handleKeyDown = (e) => { if (e.key === 'Enter') { e.preventDefault(); handleBlur(); onAddNewItemAfter(item.id); } };
            const handleDragStart = (e) => { e.stopPropagation(); e.dataTransfer.setData('text/plain', item.id); e.dataTransfer.effectAllowed = 'move'; };
            const handleDragOver  = (e) => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; };
            const handleDrop = (e) => { e.preventDefault(); setIsDragOver(false); const id = e.dataTransfer.getData('text/plain'); if (id && id !== item.id) onDropItem(id, item.id); };

            return (
                <li
                    draggable={!isLocked}
                    onDragStart={handleDragStart}
                    onDragOver={handleDragOver}
                    onDragEnter={(e) => { e.preventDefault(); setIsDragOver(true); }}
                    onDragLeave={() => setIsDragOver(false)}
                    onDrop={handleDrop}
                    onDragEnd={() => { setIsDragOver(false); onDragEndItem(); }}
                    className={`flex items-center space-x-2 group p-1 rounded-md transition-all ${isDragOver ? 'bg-sky-700/30 border border-sky-500' : ''} ${isLocked ? 'cursor-default' : 'cursor-grab'}`}
                >
                    <input
                        type="checkbox" checked={item.completed}
                        onChange={e => onUpdate(item.id, { completed: e.target.checked, completedAt: e.target.checked ? new Date().toISOString() : null })}
                        disabled={isLocked}
                        className="form-checkbox h-4 w-4 rounded bg-slate-700 border-slate-500 text-sky-500 focus:ring-sky-500 cursor-pointer disabled:cursor-not-allowed disabled:opacity-50"
                    />
                    <input
                        ref={inputRef} type="text" value={text}
                        onChange={e => setText(e.target.value)} onKeyDown={handleKeyDown} onBlur={handleBlur}
                        readOnly={isLocked}
                        className={`flex-grow min-w-0 bg-transparent text-sm p-1 rounded-md transition-colors ${item.completed ? 'text-slate-500 line-through' : 'text-slate-300'} ${!isLocked ? 'hover:bg-slate-700/50' : ''} focus:bg-slate-700 read-only:cursor-default`}
                    />
                    {item.completed && item.completedAt && (
                        <span className="text-xs text-slate-500 ml-2 whitespace-nowrap">
                            ({new Date(item.completedAt).toLocaleString('en-US', { timeZone: clockTimezone, month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit', timeZoneName: 'short' })})
                        </span>
                    )}
                    <button onClick={() => onDelete(item.id)} title="Delete item" disabled={isLocked} className="text-slate-500 hover:text-red-400 opacity-0 group-hover:opacity-100 transition-opacity disabled:hidden">
                        <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" /></svg>
                    </button>
                </li>
            );
        });

        // Header: title, badges, priority buttons, completion button
        const TaskCardHeader = React.memo(({
            task, isBlocked, isUnlocked, blockedCount, isLocked, windowWidth,
            isEditingTitle, title, titleInputRef,
            onTitleChange, onTitleBlur, onTitleKeyDown, onStartEdit,
            onSetPriority, onCompletionToggle
        }) => (
            <div className="px-5 pt-5 pb-4 border-b border-slate-700/50">
                <div className={`flex flex-wrap justify-between items-center ${windowWidth < 768 ? 'flex-col items-start gap-4' : ''}`}>
                    {/* Title */}
                    <div className="flex-grow min-w-0 mr-4">
                        {isEditingTitle ? (
                            <input
                                ref={titleInputRef} type="text" value={title}
                                onChange={e => onTitleChange(e.target.value)}
                                onBlur={onTitleBlur} onKeyDown={onTitleKeyDown}
                                className="w-full bg-slate-900/50 rounded-md py-1 text-slate-50 font-semibold text-lg border border-slate-600 focus:ring-2 focus:ring-sky-500"
                            />
                        ) : (
                            <div className="flex items-center gap-2 flex-wrap">
                                {isBlocked && (
                                    <span className="text-xs font-bold px-2 py-0.5 rounded bg-amber-500/20 text-amber-300 border border-amber-500/30 whitespace-nowrap flex items-center gap-1">
                                        <LockClosedIcon /> Blocked by {blockedCount}
                                    </span>
                                )}
                                {isUnlocked && (
                                    <span className="text-xs font-bold px-2 py-0.5 rounded bg-green-500/20 text-green-300 border border-green-500/30 flex items-center gap-1">
                                        <LockOpenIcon /> Unblocked
                                    </span>
                                )}
                                <h3
                                    onDoubleClick={isLocked ? undefined : onStartEdit}
                                    title={isLocked ? "Task is completed" : "Double-click to edit title"}
                                    className={`font-semibold text-slate-50 break-words text-lg rounded-md transition-colors ${isLocked ? 'cursor-default line-through text-slate-500' : 'cursor-pointer hover:bg-slate-700/50 px-2 -mx-2 py-1 -my-1'}`}
                                >{task.title}</h3>
                            </div>
                        )}
                    </div>

                    {/* Priority + completion */}
                    <div className={`flex items-center gap-4 flex-shrink-0 ${windowWidth < 768 ? 'w-full justify-between mt-4 pt-4 border-t border-slate-700/50' : 'ml-4'}`}>
                        <div className="flex items-center space-x-2">
                            <span className="text-xs text-slate-400">Priority:</span>
                            <div className="flex flex-wrap gap-1">
                                {DISPLAY_PRIORITY_ORDER.map(pConst => {
                                    const cfg = PRIORITY_CONFIG[pConst];
                                    const active = task.priority === pConst;
                                    return (
                                        <button
                                            key={pConst} title={`Set priority: ${cfg.title}`}
                                            onClick={() => onSetPriority(pConst)} disabled={isLocked}
                                            className={`px-3 py-1 text-[10px] font-bold uppercase tracking-tight rounded-md border transition-all disabled:opacity-40 ${active ? `${cfg.bgColor} ${cfg.borderColor} ${cfg.color} scale-105 shadow-md` : `bg-slate-800/50 border-slate-700 text-slate-400 hover:${cfg.bgColor}`}`}
                                        >{cfg.title}</button>
                                    );
                                })}
                            </div>
                        </div>
                        <button
                            onClick={onCompletionToggle}
                            title={isBlocked ? "Task is blocked by a dependency" : (isLocked ? "Mark as 'To Do' (C)" : "Mark as 'Completed' (C)")}
                            disabled={isBlocked && !isLocked}
                            className={`p-3 rounded-full transition-all duration-200 transform hover:scale-110 ${isLocked ? 'bg-green-500 text-white shadow-lg shadow-green-500/30' : 'bg-slate-800 text-slate-400 hover:text-green-400 hover:bg-green-500/20 border border-slate-700'} disabled:cursor-not-allowed disabled:text-slate-600 disabled:hover:bg-transparent disabled:scale-100`}
                        >
                            <CheckIcon />
                        </button>
                    </div>
                </div>
            </div>
        ));

        // Notes: textarea with auto-resize
        const TaskNotes = React.memo(({ taskId, initialNotes, isLocked }) => {
            const { updateTask } = useAppContext();
            const [notes, setNotes]   = useState(initialNotes || '');
            const textareaRef         = useRef(null);

            useEffect(() => { setNotes(initialNotes || ''); }, [initialNotes]);
            useEffect(() => {
                if (textareaRef.current) {
                    textareaRef.current.style.height = 'auto';
                    textareaRef.current.style.height = `${textareaRef.current.scrollHeight}px`;
                }
            }, [notes]);

            return (
                <Panel>
                    <SectionLabel>Notes</SectionLabel>
                    <textarea
                        ref={textareaRef}
                        value={notes}
                        onChange={e => setNotes(e.target.value)}
                        onBlur={() => { if (notes !== (initialNotes || '')) updateTask(taskId, { notes }, 'Notes were updated.'); }}
                        placeholder="Notes..."
                        disabled={isLocked}
                        className="w-full bg-transparent text-slate-300 p-1 rounded-md border border-transparent focus:bg-slate-900/80 focus:border-slate-600 focus:ring-0 resize-none overflow-hidden text-sm placeholder-slate-500 disabled:cursor-not-allowed hover:bg-slate-900/80 transition-colors"
                    />
                </Panel>
            );
        });

        // Checklist: items, drag-reorder, add item
        const TaskChecklist = React.memo(({ taskId, initialChecklist, isLocked, clockTimezone }) => {
            const { updateTask } = useAppContext();
            const [checklist, setChecklist]         = useState(initialChecklist || []);
            const [focusedItemId, setFocusedItemId] = useState(null);
            const [isExpanded, setIsExpanded]       = useState(true);
            const draggedId                         = useRef(null);

            useEffect(() => { setChecklist(initialChecklist || []); }, [initialChecklist]);

            const handleUpdateChecklist = useCallback((updatedList) => {
                setChecklist(updatedList);
                updateTask(taskId, { checklist: updatedList }, 'Checklist updated.');
            }, [taskId, updateTask]);

            const handleItemUpdate = (id, vals) => handleUpdateChecklist(checklist.map(i => i.id === id ? { ...i, ...vals } : i));
            const handleItemDelete = (id)       => handleUpdateChecklist(checklist.filter(i => i.id !== id));
            const handleAddItem    = ()         => {
                const newId = crypto.randomUUID();
                setFocusedItemId(newId);
                handleUpdateChecklist([...checklist, { id: newId, text: '', completed: false }]);
            };
            const handleAddNewItemAfter = useCallback((currentId) => {
                const newId = crypto.randomUUID();
                setFocusedItemId(newId);
                const idx = checklist.findIndex(i => i.id === currentId);
                const next = [...checklist];
                next.splice(idx + 1, 0, { id: newId, text: '', completed: false });
                handleUpdateChecklist(next);
            }, [checklist, handleUpdateChecklist]);

            const handleDrop = useCallback((draggedItemId, targetId) => {
                const from = checklist.findIndex(i => i.id === draggedItemId);
                const to   = checklist.findIndex(i => i.id === targetId);
                if (from === -1 || to === -1) return;
                const next = [...checklist];
                const [item] = next.splice(from, 1);
                next.splice(to, 0, item);
                handleUpdateChecklist(next);
            }, [checklist, handleUpdateChecklist]);

            return (
                <div className="bg-slate-900/40 rounded-lg border border-slate-700/50">
                    <button onClick={() => setIsExpanded(p => !p)} className="w-full flex justify-between items-center p-4 text-left">
                        <SectionLabel className="mb-0">Checklist ({checklist.length})</SectionLabel>
                        <ChevronDownIcon className={`h-5 w-5 text-slate-400 transition-transform ${isExpanded ? 'rotate-180' : ''}`} />
                    </button>
                    {isExpanded && (
                        <div className="px-4 pb-4 pt-0 space-y-1">
                            <ul className="space-y-1">
                                {checklist.map(item => (
                                    <ChecklistItem
                                        key={item.id} item={item}
                                        onUpdate={handleItemUpdate} onDelete={handleItemDelete}
                                        onAddNewItemAfter={handleAddNewItemAfter}
                                        isFocused={focusedItemId === item.id}
                                        onFocusHandled={() => setFocusedItemId(null)}
                                        isLocked={isLocked} clockTimezone={clockTimezone}
                                        onDropItem={handleDrop}
                                        onDragEndItem={() => { draggedId.current = null; }}
                                    />
                                ))}
                            </ul>
                            <button onClick={handleAddItem} disabled={isLocked} className="w-full text-left text-sky-400 hover:text-sky-300 p-1 rounded-md hover:bg-slate-700/50 disabled:text-slate-500 disabled:cursor-not-allowed text-sm">
                                + Add item
                            </button>
                        </div>
                    )}
                </div>
            );
        });

        // Time tracking: elapsed display, start/stop/reset
        const TaskTimeTracking = React.memo(({ task, isLocked }) => {
            const { updateTask }                              = useAppContext();
            const [showResetConfirm, setShowResetConfirm]    = useState(false);

            const handleToggle = () => {
                if (task.timingSessionStartTime) {
                    const sessionSec = (new Date().getTime() - new Date(task.timingSessionStartTime).getTime()) / 1000;
                    updateTask(task.id, { timingSessionStartTime: null, timeSpentSeconds: (task.timeSpentSeconds || 0) + sessionSec });
                } else {
                    updateTask(task.id, { timingSessionStartTime: new Date().toISOString() });
                }
            };

            const handleReset = () => {
                updateTask(task.id, { timeSpentSeconds: 0, timingSessionStartTime: null }, 'Time tracking was reset.');
                setShowResetConfirm(false);
            };

            return (
                <>
                    <Panel>
                        <SectionLabel>Time Tracking</SectionLabel>
                        <div className="flex items-center justify-between gap-2">
                            <TimeElapsed startTime={task.timingSessionStartTime} totalElapsedSeconds={task.timeSpentSeconds} />
                            <div className="flex items-center gap-2">
                                <button
                                    onClick={() => setShowResetConfirm(true)}
                                    disabled={isLocked || (!task.timeSpentSeconds && !task.timingSessionStartTime)}
                                    title="Reset timer"
                                    className="p-2 text-sm font-semibold rounded-md transition-colors text-slate-400 hover:bg-slate-700 hover:text-white disabled:opacity-40 disabled:cursor-not-allowed"
                                >
                                    <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4" fill="currentColor" viewBox="0 0 16 16"><path fillRule="evenodd" d="M8 3a5 5 0 1 0 4.546 2.914.5.5 0 0 1 .908-.417A6 6 0 1 1 8 2v1z" /><path d="M8 4.466V.534a.25.25 0 0 1 .41-.192l2.36 1.966c.12.1.12.284 0 .384L8.41 4.658A.25.25 0 0 1 8 4.466z" /></svg>
                                </button>
                                <button
                                    onClick={handleToggle} disabled={isLocked}
                                    className={`px-4 py-1.5 text-sm font-semibold rounded-md transition-colors disabled:opacity-40 disabled:cursor-not-allowed ${task.timingSessionStartTime ? 'bg-red-500/80 hover:bg-red-500 text-white' : 'bg-green-500/80 hover:bg-green-500 text-white'}`}
                                >
                                    {task.timingSessionStartTime ? 'Stop' : 'Start'}
                                </button>
                            </div>
                        </div>
                    </Panel>
                    {showResetConfirm && (
                        <Modal onClose={() => setShowResetConfirm(false)}>
                            <div className="bg-slate-800 rounded-xl shadow-2xl p-6 w-full max-w-sm text-center" onClick={e => e.stopPropagation()}>
                                <h3 className="text-lg font-bold text-white mb-2">Reset Time?</h3>
                                <p className="text-slate-300 mb-5 text-sm">Tracked time for this task will be permanently cleared.</p>
                                <div className="flex justify-center gap-3">
                                    <Btn variant="secondary" onClick={() => setShowResetConfirm(false)}>Cancel</Btn>
                                    <Btn variant="danger" onClick={handleReset}>Reset</Btn>
                                </div>
                            </div>
                        </Modal>
                    )}
                </>
            );
        });

        // Meta: due date, tags, size, project selector, timestamps, delete
        const TaskMeta = React.memo(({ task, isLocked, clockTimezone, onDelete }) => {
            const { updateTask, allProjects } = useAppContext();
            const [dueDateInput, setDueDateInput] = useState('');
            const [tagInput, setTagInput]         = useState('');

            useEffect(() => { setDueDateInput(task.dueDate ? new Date(task.dueDate).toISOString().split('T')[0] : ''); }, [task.dueDate]);

            const handleDueDateChange = (e) => {
                const val = e.target.value;
                setDueDateInput(val);
                if (val) {
                    const d = new Date(val);
                    d.setUTCHours(23, 59, 59, 999);
                    updateTask(task.id, { dueDate: d.toISOString() }, `Due date set to ${d.toLocaleDateString()}.`);
                } else {
                    updateTask(task.id, { dueDate: null }, 'Due date was removed.');
                }
            };

            const handleTagKeyDown = (e) => {
                if (e.key === 'Enter' && tagInput.trim() !== '') {
                    e.preventDefault();
                    updateTask(task.id, { tags: [...new Set([...(task.tags || []), tagInput.trim()])] }, `Tag "${tagInput.trim()}" added.`);
                    setTagInput('');
                }
            };

            const handleRemoveTag = (tag) => updateTask(task.id, { tags: (task.tags || []).filter(t => t !== tag) });

            const daysLeft = task.dueDate ? Math.ceil((new Date(task.dueDate) - new Date()) / (1000 * 60 * 60 * 24)) : null;
            const dueBadgeClass = daysLeft === null ? '' :
                daysLeft < 0  ? 'bg-red-500/30 text-red-300' :
                daysLeft === 0 ? 'bg-amber-500/30 text-amber-300' : 'bg-slate-700 text-slate-300';

            return (
                <Panel className="space-y-4">
                    {/* Due Date */}
                    <div>
                        <SectionLabel>Due Date</SectionLabel>
                        <div className="flex items-center gap-2">
                            <input
                                type="date" value={dueDateInput} onChange={handleDueDateChange}
                                disabled={isLocked}
                                className="w-full bg-slate-700 text-slate-100 text-sm p-1.5 rounded-md border border-slate-500 focus:ring-1 focus:ring-sky-500 disabled:opacity-50"
                            />
                            {task.dueDate && (
                                <span className={`text-xs font-semibold px-2 py-1 rounded-md whitespace-nowrap ${dueBadgeClass}`}>
                                    {daysLeft} days left
                                </span>
                            )}
                        </div>
                    </div>

                    {/* Tags */}
                    <div>
                        <SectionLabel>Tags</SectionLabel>
                        <div className="flex flex-wrap gap-2 items-center">
                            {(task.tags || []).map(tag => (
                                <span key={tag} className={`flex items-center gap-1 text-xs font-semibold px-2 py-1 rounded-full ${getTagColor(tag)}`}>
                                    {tag}
                                    {!isLocked && <button onClick={() => handleRemoveTag(tag)} className="opacity-70 hover:opacity-100">&times;</button>}
                                </span>
                            ))}
                            {!isLocked && (
                                <input type="text" value={tagInput} onChange={e => setTagInput(e.target.value)} onKeyDown={handleTagKeyDown} placeholder="+ Add tag"
                                    className="bg-transparent text-slate-300 text-xs p-1 focus:ring-0 focus:outline-none border-b border-dashed border-slate-600 focus:border-solid focus:border-sky-500 transition-colors"
                                />
                            )}
                        </div>
                    </div>

                    {/* Task Size */}
                    <div>
                        <SectionLabel>Task Size</SectionLabel>
                        <select
                            value={task.size || ''} disabled={isLocked}
                            onChange={e => updateTask(task.id, { size: e.target.value || null })}
                            className="w-full bg-slate-800 text-slate-200 text-sm p-1.5 rounded-md border border-slate-600 focus:ring-1 focus:ring-sky-500 disabled:opacity-50"
                        >
                            <option value="">Not Set</option>
                            {Object.entries(TASK_SIZES).map(([k, v]) => <option key={k} value={k}>{v}</option>)}
                        </select>
                    </div>

                    {/* Footer: project selector + timestamps + delete */}
                    <div className="pt-3 border-t border-slate-700/50 space-y-3">
                        <div className="text-xs text-slate-500 space-y-1">
                            <div className="flex justify-between"><span>Created:</span><span>{new Date(task.createdAt || task.timestamp).toLocaleString([], { timeZone: clockTimezone, dateStyle: 'medium', timeStyle: 'short' })}</span></div>
                            <div className="flex justify-between"><span>Last Updated:</span><span>{new Date(task.timestamp).toLocaleString([], { timeZone: clockTimezone, dateStyle: 'medium', timeStyle: 'short' })}</span></div>
                        </div>
                        <div className="flex justify-between items-center">
                            <select
                                value={task.project || ''} disabled={isLocked}
                                onChange={e => updateTask(task.id, { project: e.target.value || null })}
                                className="text-sm bg-slate-800 text-slate-200 px-2 py-1 rounded-md border border-slate-600 hover:bg-slate-700 focus:ring-2 focus:ring-sky-500 disabled:cursor-not-allowed disabled:opacity-70"
                            >
                                {!task.project && <option value="">Unassigned</option>}
                                {allProjects.map(p => <option key={p} value={p}>{p}</option>)}
                            </select>
                            <button onClick={onDelete} title="Delete Permanently (D)" className="text-red-400 hover:text-white transition-colors p-1 rounded-full hover:bg-red-500">
                                <DeleteIcon />
                            </button>
                        </div>
                    </div>
                </Panel>
            );
        });

        // Dependencies: upstream/downstream with navigation
        const TaskDependencies = React.memo(({ task, isLocked, onNavigateTo }) => {
            const { tasks, updateTask }                       = useAppContext();
            const [isAddingUpstream, setIsAddingUpstream]     = useState(false);
            const [isAddingDownstream, setIsAddingDownstream] = useState(false);
            const upstreamRef   = useRef(null);
            const downstreamRef = useRef(null);

            useEffect(() => { if (isAddingUpstream   && upstreamRef.current)   upstreamRef.current.focus();   }, [isAddingUpstream]);
            useEffect(() => { if (isAddingDownstream && downstreamRef.current) downstreamRef.current.focus(); }, [isAddingDownstream]);

            // Tasks that can be added as upstream (this task would depend on them)
            const availableUpstream = useMemo(() => tasks.filter(t => {
                if (t.id === task.id || t.status === TASK_STATUS.DONE || (task.dependsOn || []).includes(t.id)) return false;
                return !hasDependency(t.id, task.id, tasks); // t must not already depend on current task
            }), [tasks, task.id, task.dependsOn]);

            // Tasks that can be added as downstream (they would depend on this task)
            const availableDownstream = useMemo(() => tasks.filter(t => {
                if (t.id === task.id || t.status === TASK_STATUS.DONE || t.dependsOn?.includes(task.id)) return false;
                return !hasDependency(task.id, t.id, tasks); // current task must not already depend on t
            }), [tasks, task.id]);

            // Tasks blocked by this task
            const blockedByThis = useMemo(() => tasks.filter(t => t.dependsOn?.includes(task.id)), [tasks, task.id]);

            const handleAddUpstream = (e) => {
                const depId = e.target.value;
                if (!depId) return;
                const dep = tasks.find(t => t.id === depId);
                if (dep) updateTask(task.id, { dependsOn: [...(task.dependsOn || []), depId] }, `Now depends on "${dep.title}".`);
                setIsAddingUpstream(false);
            };

            const handleRemoveUpstream = (depId) => {
                const dep = tasks.find(t => t.id === depId);
                updateTask(task.id, { dependsOn: (task.dependsOn || []).filter(id => id !== depId) }, `Removed dependency on "${dep?.title}".`);
            };

            const handleAddDownstream = (e) => {
                const targetId = e.target.value;
                if (!targetId) return;
                if (hasDependency(task.id, targetId, tasks)) {
                    alert("Circular dependency detected! A task cannot block one of its own upstream dependencies.");
                    e.target.value = '';
                    return;
                }
                const target = tasks.find(t => t.id === targetId);
                if (target) updateTask(target.id, { dependsOn: [...(target.dependsOn || []), task.id] }, `Is now blocked by "${task.title}".`);
                setIsAddingDownstream(false);
            };

            const handleRemoveDownstream = (targetId) => {
                const target = tasks.find(t => t.id === targetId);
                updateTask(target.id, { dependsOn: target.dependsOn.filter(id => id !== task.id) }, `Is no longer blocked by "${task.title}".`);
            };

            const depStatusDot = (depTask) => {
                if (depTask.status === TASK_STATUS.DONE) return <span className="w-2 h-2 rounded-full bg-green-500 flex-shrink-0" title="Completed" />;
                const blocked = depTask.dependsOn?.some(id => tasks.find(t => t.id === id)?.status !== TASK_STATUS.DONE);
                return <span className={`w-2 h-2 rounded-full flex-shrink-0 ${blocked ? 'bg-amber-500' : 'bg-sky-500'}`} title={blocked ? 'Blocked' : 'Active'} />;
            };

            return (
                <Panel>
                    <div className="flex items-center gap-3 text-center mb-3">
                        <div className="flex-1 flex items-center justify-center gap-2">
                            <SectionLabel className="mb-0">Upstream</SectionLabel>
                            {!isLocked && <button onClick={() => setIsAddingUpstream(p => !p)} title="Add upstream dependency" className="text-sky-400 hover:text-sky-300"><svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4" viewBox="0 0 20 20" fill="currentColor"><path fillRule="evenodd" d="M10 5a1 1 0 011 1v3h3a1 1 0 110 2h-3v3a1 1 0 11-2 0v-3H6a1 1 0 110-2h3V6a1 1 0 011-1z" clipRule="evenodd" /></svg></button>}
                        </div>
                        <div className="w-6 h-6 flex-shrink-0" />
                        <SectionLabel className="flex-1 w-1/3 mb-0 text-slate-300">Current</SectionLabel>
                        <div className="w-6 h-6 flex-shrink-0" />
                        <div className="flex-1 flex items-center justify-center gap-2">
                            <SectionLabel className="mb-0">Downstream</SectionLabel>
                            {!isLocked && <button onClick={() => setIsAddingDownstream(p => !p)} title="Block another task" className="text-sky-400 hover:text-sky-300"><svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4" viewBox="0 0 20 20" fill="currentColor"><path fillRule="evenodd" d="M10 5a1 1 0 011 1v3h3a1 1 0 110 2h-3v3a1 1 0 11-2 0v-3H6a1 1 0 110-2h3V6a1 1 0 011-1z" clipRule="evenodd" /></svg></button>}
                        </div>
                    </div>

                    <div className="flex items-center gap-3">
                        {/* Upstream column */}
                        <div className="flex-1 space-y-2">
                            {(task.dependsOn || []).length > 0 ? (task.dependsOn || []).map(depId => {
                                const dep = tasks.find(t => t.id === depId);
                                if (!dep) return null;
                                return (
                                    <div key={depId} className="flex items-center justify-between bg-slate-800/70 p-2.5 rounded-md text-sm gap-2 min-h-[48px]">
                                        {depStatusDot(dep)}
                                        <button onClick={() => onNavigateTo(depId)} className={`flex-grow text-left text-xs hover:underline ${dep.status === TASK_STATUS.DONE ? 'line-through text-slate-500' : 'text-slate-200 hover:text-sky-300'}`}>{dep.title}</button>
                                        {!isLocked && <button onClick={() => handleRemoveUpstream(depId)} className="text-slate-500 hover:text-red-400 flex-shrink-0 text-base leading-none">&times;</button>}
                                    </div>
                                );
                            }) : (!isAddingUpstream && <div className="text-xs text-slate-500 text-center italic min-h-[48px] flex items-center justify-center">None</div>)}
                            {isAddingUpstream && !isLocked && (
                                <select ref={upstreamRef} onChange={handleAddUpstream} onBlur={() => setIsAddingUpstream(false)} className="w-full bg-slate-800 text-slate-200 text-sm p-2.5 rounded-md border border-slate-600 focus:ring-1 focus:ring-sky-500 min-h-[48px]">
                                    <option value="">+ Add dependency...</option>
                                    {availableUpstream.map(t => <option key={t.id} value={t.id}>{t.title}</option>)}
                                </select>
                            )}
                        </div>

                        {/* Arrow */}
                        <div className="flex-shrink-0"><svg className="w-6 h-6 text-slate-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17 8l4 4m0 0l-4 4m4-4H3" /></svg></div>

                        {/* Current task */}
                        <div className="flex-1 w-1/3">
                            <div className="bg-sky-900/50 border border-sky-700 p-2.5 rounded-md text-sm text-center min-h-[48px] flex items-center justify-center">
                                <span className="font-bold text-sky-200 text-xs leading-tight">{task.title}</span>
                            </div>
                        </div>

                        {/* Arrow */}
                        <div className="flex-shrink-0"><svg className="w-6 h-6 text-slate-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17 8l4 4m0 0l-4 4m4-4H3" /></svg></div>

                        {/* Downstream column */}
                        <div className="flex-1 space-y-2">
                            {blockedByThis.length > 0 ? blockedByThis.map(bt => (
                                <div key={bt.id} className="flex items-center justify-between bg-slate-800/70 p-2.5 rounded-md text-sm gap-2 min-h-[48px]">
                                    {depStatusDot(bt)}
                                    <button onClick={() => onNavigateTo(bt.id)} className="flex-grow text-left text-slate-200 hover:text-sky-300 text-xs hover:underline">{bt.title}</button>
                                    {!isLocked && <button onClick={() => handleRemoveDownstream(bt.id)} className="text-slate-500 hover:text-red-400 flex-shrink-0 text-base leading-none">&times;</button>}
                                </div>
                            )) : (!isAddingDownstream && <div className="text-xs text-slate-500 text-center italic min-h-[48px] flex items-center justify-center">None</div>)}
                            {isAddingDownstream && !isLocked && (
                                <select ref={downstreamRef} onChange={handleAddDownstream} onBlur={() => setIsAddingDownstream(false)} className="w-full bg-slate-800 text-slate-200 text-sm p-2.5 rounded-md border border-slate-600 focus:ring-1 focus:ring-sky-500 min-h-[48px]">
                                    <option value="">+ Block another task...</option>
                                    {availableDownstream.map(t => <option key={t.id} value={t.id}>{t.title}</option>)}
                                </select>
                            )}
                        </div>
                    </div>
                </Panel>
            );
        });

        // Activity log: collapsible list of log entries
        const TaskActivityLog = React.memo(({ activityLog, clockTimezone }) => {
            const [isExpanded, setIsExpanded] = useState(false);
            if (!activityLog || activityLog.length === 0) return null;
            return (
                <div className="bg-slate-900/40 rounded-lg border border-slate-700/50">
                    <button onClick={() => setIsExpanded(p => !p)} className="w-full flex justify-between items-center p-4 text-left">
                        <SectionLabel className="mb-0">Activity Log ({activityLog.length})</SectionLabel>
                        <ChevronDownIcon className={`h-5 w-5 text-slate-400 transition-transform ${isExpanded ? 'rotate-180' : ''}`} />
                    </button>
                    {isExpanded && (
                        <div className="px-4 pb-4">
                            <div className="space-y-2 max-h-[22rem] overflow-y-auto pr-2 border-t border-slate-700/50 pt-3">
                                {[...activityLog].reverse().map((log, i) => (
                                    <div key={i} className="flex justify-between items-start text-xs gap-4">
                                        <p className="text-slate-300">{log.message}</p>
                                        <p className="text-slate-500 whitespace-nowrap flex-shrink-0">
                                            {new Date(log.timestamp).toLocaleString([], { timeZone: clockTimezone, month: 'numeric', day: 'numeric', hour: 'numeric', minute: '2-digit' })}
                                        </p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        });


        // ─── 9. TASK CARD ─────────────────────────────────────────────────────

        const TaskCard = ({ task, clockTimezone, startInEditMode, onEditModeEnd, isDetailedView, onSelect }) => {
            const { tasks, updateTask, settings, setTaskToDelete } = useAppContext();
            const now         = useNow();
            const windowWidth = useWindowWidth();
            const isLocked    = task.status === TASK_STATUS.DONE;

            // Title editing state lives here (shared between header and effects)
            const [isEditingTitle, setIsEditingTitle] = useState(false);
            const [title, setTitle]                   = useState(task.title);
            const titleInputRef                       = useRef(null);

            useEffect(() => { setTitle(task.title); }, [task.title]);
            useEffect(() => { if (startInEditMode) { setIsEditingTitle(true); if (onEditModeEnd) onEditModeEnd(); } }, [startInEditMode, onEditModeEnd]);
            useEffect(() => { if (isEditingTitle && titleInputRef.current) titleInputRef.current.focus(); }, [isEditingTitle]);

            // Derived dependency state
            const isBlocked = useMemo(() => {
                if (!task.dependsOn || task.dependsOn.length === 0) return false;
                return task.dependsOn.some(depId => tasks.find(t => t.id === depId)?.status !== TASK_STATUS.DONE);
            }, [task.dependsOn, tasks]);

            const isUnlocked = useMemo(() => {
                if (isLocked || !task.dependsOn || task.dependsOn.length === 0) return false;
                return !isBlocked;
            }, [isLocked, task.dependsOn, isBlocked]);

            const blockedCount = useMemo(() =>
                (task.dependsOn || []).filter(depId => tasks.find(t => t.id === depId)?.status !== TASK_STATUS.DONE).length,
            [task.dependsOn, tasks]);

            const handleTitleBlur = () => {
                setIsEditingTitle(false);
                const final = title.trim() === '' ? 'Untitled Task' : title.trim();
                if (final !== task.title) updateTask(task.id, { title: final }, 'Title was changed.');
            };
            const handleTitleKeyDown = (e) => { if (e.key === 'Enter') { e.preventDefault(); handleTitleBlur(); } };
            const handleSetPriority  = (p) => updateTask(task.id, { priority: task.priority === p ? null : p });
            const handleCompletionToggle = () => {
                if (task.status === TASK_STATUS.DONE) {
                    updateTask(task.id, { status: TASK_STATUS.TO_DO }, 'Task status changed to To Do.');
                } else {
                    updateTask(task.id, { status: TASK_STATUS.DONE, reminderAt: null, reminderFired: false });
                }
            };
            const handleDeleteRequest = useCallback(() => {
                if (settings.confirmOnDelete) setTaskToDelete(task.id);
                else updateTask(task.id, { _delete: true });
            }, [task.id, settings.confirmOnDelete, setTaskToDelete, updateTask]);

            // Pulse for due reminder
            const reminderIsDue = task.reminderAt && new Date(task.reminderAt) <= now;
            const pulseClass    = reminderIsDue ? (PRIORITY_CONFIG[task.priority]?.pulseClass || '') : '';

            // ── Project View Card (compact 5-column summary) ──
            if (!isDetailedView) {
                const upstreamTasks = (task.dependsOn || [])
                    .map(depId => tasks.find(t => t.id === depId))
                    .filter(t => t && t.status !== TASK_STATUS.DONE);

                return (
                    <div onClick={() => onSelect(task.id)} className={`w-full min-w-0 bg-slate-800/80 backdrop-blur-sm border border-slate-700/50 rounded-xl shadow-md transition-all duration-300 cursor-pointer hover:border-sky-500 hover:shadow-lg ${TASK_STATUS_CONFIG[task.status]?.glowClass || ''} ${isLocked ? 'opacity-60' : ''} ${isBlocked ? 'ring-2 ring-amber-500/50' : ''}`}>
                        <div className="px-4 py-3 border-b border-slate-700/30 bg-slate-900/40">
                            <div className="flex items-center justify-between gap-3">
                                <div className="flex items-center gap-2.5 min-w-0">
                                    {isUnlocked && <div className="p-1.5 bg-green-500/20 text-green-400 rounded-lg flex-shrink-0"><LockOpenIcon /></div>}
                                    {isBlocked  && <div className="p-1.5 bg-amber-500/20 text-amber-400 rounded-lg flex-shrink-0"><LockClosedIcon /></div>}
                                    <h3 className={`font-bold text-slate-100 break-words text-base leading-tight ${isLocked ? 'line-through text-slate-500' : ''}`}>{task.title}</h3>
                                </div>
                                <div className="flex-shrink-0 text-slate-500"><svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7" /></svg></div>
                            </div>
                        </div>
                        <div className="flex flex-col sm:grid sm:grid-cols-2 lg:grid-cols-5 text-center sm:text-left divide-y sm:divide-y-0 lg:divide-x divide-slate-700/30">
                            {[
                                { label: 'Priority',  content: <span className={`text-xs font-bold ${PRIORITY_CONFIG[task.priority]?.color || 'text-slate-300'}`}>{PRIORITY_CONFIG[task.priority]?.title || 'Unprioritized'}</span> },
                                { label: 'Size',      content: <span className="text-xs font-bold text-slate-300">{task.size ? TASK_SIZES[task.size] : '—'}</span> },
                                { label: <><svg xmlns="http://www.w3.org/2000/svg" className="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636" /></svg>Blocked By</>, content: upstreamTasks.length > 0 ? (<div className="flex flex-wrap gap-1.5 justify-center">{upstreamTasks.map((t, i) => (<button key={t.id} onClick={e => { e.stopPropagation(); onSelect(t.id); }} className="text-sky-400 hover:text-sky-300 underline text-[11px]">{t.title}{i < upstreamTasks.length - 1 ? ',' : ''}</button>))}</div>) : <span className="text-slate-600 italic text-[11px]">None</span> },
                                { label: <><svg xmlns="http://www.w3.org/2000/svg" className="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>Progress</>, content: <TimeElapsed startTime={task.timingSessionStartTime} totalElapsedSeconds={task.timeSpentSeconds} /> },
                                { label: <><svg xmlns="http://www.w3.org/2000/svg" className="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>Deadline</>, content: <span className={`text-xs font-bold ${task.dueDate && new Date(task.dueDate) < new Date() ? 'text-rose-400' : 'text-slate-300'}`}>{task.dueDate ? new Date(task.dueDate).toLocaleDateString([], { month: 'short', day: 'numeric' }) : '—'}</span> }
                            ].map(({ label, content }, i) => (
                                <div key={i} className="p-3 flex items-center justify-between sm:flex-col sm:items-start sm:justify-start lg:items-center lg:justify-center border-slate-700/30">
                                    <div className="text-[10px] font-black text-slate-500 uppercase tracking-[0.15em] sm:mb-1.5 flex items-center gap-1.5">{label}</div>
                                    <div>{content}</div>
                                </div>
                            ))}
                        </div>
                    </div>
                );
            }

            // ── Detailed View Card ──
            return (
                <>
                    <div className={`w-full min-w-0 bg-slate-800/80 backdrop-blur-xl border border-slate-700/50 rounded-xl shadow-lg transition-shadow duration-300 ${pulseClass} ${TASK_STATUS_CONFIG[task.status]?.glowClass || ''} ${isLocked ? 'opacity-60' : ''} ${isBlocked ? 'ring-2 ring-amber-500/80' : ''}`}>
                        <TaskCardHeader
                            task={task} isBlocked={isBlocked} isUnlocked={isUnlocked} blockedCount={blockedCount}
                            isLocked={isLocked} windowWidth={windowWidth}
                            isEditingTitle={isEditingTitle} title={title} titleInputRef={titleInputRef}
                            onTitleChange={setTitle} onTitleBlur={handleTitleBlur} onTitleKeyDown={handleTitleKeyDown}
                            onStartEdit={() => setIsEditingTitle(true)}
                            onSetPriority={handleSetPriority} onCompletionToggle={handleCompletionToggle}
                        />

                        <div className="px-5 pb-4 pt-3 space-y-4">
                            <TaskNotes taskId={task.id} initialNotes={task.notes} isLocked={isLocked} />
                            <TaskChecklist taskId={task.id} initialChecklist={task.checklist} isLocked={isLocked} clockTimezone={clockTimezone} />
                            <TaskTimeTracking task={task} isLocked={isLocked} />
                            <TaskMeta task={task} isLocked={isLocked} clockTimezone={clockTimezone} onDelete={handleDeleteRequest} />
                            <TaskDependencies
                                task={task} isLocked={isLocked}
                                onNavigateTo={(id) => onSelect && onSelect(id)}
                            />
                            <TaskActivityLog activityLog={task.activityLog} clockTimezone={clockTimezone} />

                            {task.reminderAt && (
                                <div className="pt-2 text-xs">
                                    <div className="text-sky-300 flex justify-between items-center mb-0.5">
                                        <span>Reminder: {new Date(task.reminderAt).toLocaleTimeString([], { timeZone: clockTimezone, hour: '2-digit', minute: '2-digit', second: '2-digit' })} {clockTimezone}</span>
                                        <button onClick={() => updateTask(task.id, { reminderAt: null, reminderFired: false })} title="Clear reminder" className="text-red-400 hover:text-red-300 text-xs">(clear)</button>
                                    </div>
                                    <ReminderCountdown reminderAt={task.reminderAt} />
                                </div>
                            )}

                            {/* Keyboard shortcut hints (desktop only) */}
                            {windowWidth >= 768 && !isLocked && (
                                <div className="pt-1 flex gap-4 text-[10px] text-slate-600 font-mono select-none">
                                    <span><kbd className="px-1 py-0.5 bg-slate-800 border border-slate-700 rounded text-slate-500">C</kbd> complete</span>
                                    <span><kbd className="px-1 py-0.5 bg-slate-800 border border-slate-700 rounded text-slate-500">D</kbd> delete</span>
                                </div>
                            )}
                        </div>
                    </div>
                </>
            );
        };

        const taskCardAreEqual = (prev, next) => {
            const t1 = prev.task, t2 = next.task;
            return (
                t1.id === t2.id && t1.title === t2.title && t1.status === t2.status && t1.priority === t2.priority &&
                t1.notes === t2.notes && t1.dueDate === t2.dueDate && t1.size === t2.size && t1.project === t2.project &&
                t1.timeSpentSeconds === t2.timeSpentSeconds && t1.timingSessionStartTime === t2.timingSessionStartTime &&
                t1.reminderAt === t2.reminderAt && t1.checklist === t2.checklist && t1.tags === t2.tags &&
                t1.dependsOn === t2.dependsOn && t1.activityLog === t2.activityLog &&
                prev.clockTimezone === next.clockTimezone && prev.isDetailedView === next.isDetailedView
            );
        };
        const MemoizedTaskCard = React.memo(TaskCard, taskCardAreEqual);


        // ─── 10. TASK LIST ITEM ───────────────────────────────────────────────

        const TaskListItem = React.memo(({ task, isSelected, onSelect }) => {
            const { tasks: allTasks } = useAppContext();
            const priorityCfg = PRIORITY_CONFIG[task.priority] || PRIORITY_CONFIG.null;
            const isDone      = task.status === TASK_STATUS.DONE;

            const isBlocked = useMemo(() => {
                if (isDone || !task.dependsOn || task.dependsOn.length === 0) return false;
                return task.dependsOn.some(depId => allTasks.find(t => t.id === depId)?.status !== TASK_STATUS.DONE);
            }, [task.dependsOn, allTasks, isDone]);

            const isUnlocked = useMemo(() => {
                if (isDone || !task.dependsOn || task.dependsOn.length === 0) return false;
                return !isBlocked;
            }, [isDone, task.dependsOn, isBlocked]);

            const blockedCount = useMemo(() =>
                task.dependsOn?.filter(depId => allTasks.find(t => t.id === depId)?.status !== TASK_STATUS.DONE).length || 0,
            [task.dependsOn, allTasks]);

            const totalSubtasks     = task.checklist?.length || 0;
            const completedSubtasks = task.checklist?.filter(s => s.completed).length || 0;
            const progressPercent   = totalSubtasks > 0 ? (completedSubtasks / totalSubtasks) * 100 : 0;

            const dueDateClass = useMemo(() => {
                if (!task.dueDate || isDone) return 'bg-slate-700/50 text-slate-300 border-slate-600';
                const d = Math.ceil((new Date(task.dueDate) - new Date()) / (1000 * 60 * 60 * 24));
                if (d < 0)  return 'bg-red-500/30 text-red-300 border-red-500/50';
                if (d === 0) return 'bg-amber-500/30 text-amber-300 border-amber-500/50';
                if (d <= 2)  return 'bg-yellow-500/20 text-yellow-200 border-yellow-500/30';
                return 'bg-slate-700/50 text-slate-300 border-slate-600';
            }, [task.dueDate, isDone]);

            return (
                <button
                    onClick={() => onSelect(task.id)}
                    className={`w-full text-left p-3 rounded-lg border transition-all duration-150 ${isSelected ? 'bg-sky-500/30 border-sky-400 shadow-lg' : 'bg-slate-800/50 border-slate-700 hover:bg-slate-700/50 hover:border-slate-500'}`}
                >
                    <div className="flex justify-between items-start gap-2">
                        <div className="flex-grow min-w-0">
                            <div className="flex items-center gap-1.5 flex-wrap">
                                {isBlocked && (
                                    <span className="text-[10px] font-bold px-1.5 py-0.5 rounded bg-amber-500/20 text-amber-300 border border-amber-500/30 whitespace-nowrap flex items-center gap-0.5">
                                        <LockClosedIcon /> Blocked by {blockedCount}
                                    </span>
                                )}
                                {isUnlocked && (
                                    <span className="text-[10px] font-bold px-1.5 py-0.5 rounded bg-green-500/20 text-green-300 border border-green-500/30 flex items-center gap-0.5">
                                        <LockOpenIcon /> Unblocked
                                    </span>
                                )}
                                <p className={`font-semibold break-words ${isDone ? 'line-through text-slate-500' : 'text-slate-100'}`}>{task.title}</p>
                            </div>

                            {totalSubtasks > 0 && !isDone && (
                                <div className="mt-2 mb-1">
                                    <div className="flex justify-between items-center text-[10px] text-slate-400 mb-0.5 uppercase tracking-tighter">
                                        <span>Progress</span><span>{completedSubtasks}/{totalSubtasks}</span>
                                    </div>
                                    <div className="w-full bg-slate-700 h-1 rounded-full overflow-hidden">
                                        <div className="bg-sky-500 h-full transition-all duration-500" style={{ width: `${progressPercent}%` }} />
                                    </div>
                                </div>
                            )}

                            <div className="flex items-center gap-x-2 gap-y-1 flex-wrap mt-1.5 text-xs">
                                {task.dueDate && (
                                    <span className={`font-semibold px-2 py-0.5 rounded-full whitespace-nowrap border ${dueDateClass}`}>
                                        {new Date(task.dueDate).toLocaleDateString([], { month: 'numeric', day: 'numeric' })}
                                    </span>
                                )}
                                {task.size && (
                                    <span className="font-semibold px-2 py-0.5 rounded-full bg-slate-700/50 text-slate-300 border border-slate-600 whitespace-nowrap">
                                        {TASK_SIZES[task.size]}
                                    </span>
                                )}
                                {(task.tags || []).map(tag => (
                                    <span key={tag} className={`font-semibold px-2 py-0.5 rounded-full whitespace-nowrap ${getTagColor(tag)}`}>{tag}</span>
                                ))}
                            </div>
                        </div>
                        <span className={`font-bold px-2 py-0.5 rounded-full border ${priorityCfg.color} ${priorityCfg.bgColor} ${priorityCfg.borderColor} flex-shrink-0 text-xs self-center`}>
                            {priorityCfg.title}
                        </span>
                    </div>
                </button>
            );
        });


        // ─── 11. TASK LIST ────────────────────────────────────────────────────

        const TaskList = React.memo(({ tasks, selectedTaskId, onSelectTask, onProjectHeaderClick, selectedProjectName, onShowDeleteAllModal, completedTasksCount, onAddTask }) => {
            const { projectSettings, collapsedProjects, toggleProjectCollapse, renameProject } = useAppContext();
            const [editingProject, setEditingProject]   = useState(null);
            const [newProjectName, setNewProjectName]   = useState('');

            const startRename = (projectName) => { setEditingProject(projectName); setNewProjectName(projectName); };

            const handleRenameSubmit = (oldName) => {
                if (newProjectName && newProjectName !== oldName) renameProject(oldName, newProjectName);
                setEditingProject(null);
            };

            const groupedAndSortedTasks = useMemo(() => {
                const activeSort    = (a, b) => { const d = getPrioritySortValue(a.priority) - getPrioritySortValue(b.priority); return d !== 0 ? d : a.title.localeCompare(b.title); };
                const completedSort = (a, b) => new Date(b.timestamp) - new Date(a.timestamp);

                const grouped = tasks.reduce((acc, task) => {
                    if (!acc['Completed']) acc['Completed'] = [];
                    const key = task.status === TASK_STATUS.DONE ? 'Completed' : (task.project || 'Unassigned');
                    if (!acc[key]) acc[key] = [];
                    acc[key].push(task);
                    return acc;
                }, {});

                for (const p in grouped) grouped[p].sort(p === 'Completed' ? completedSort : activeSort);

                return Object.entries(grouped).sort(([a], [b]) => {
                    if (a === 'Completed') return 1; if (b === 'Completed') return -1;
                    return a.localeCompare(b);
                });
            }, [tasks]);

                                        </div>

        const DependencyGraphModal = ({ onClose }) => {
            const { tasks } = useAppContext();
            const graphRef  = useRef(null);

            useEffect(() => {
                if (!graphRef.current) return;
                mermaid.initialize({ startOnLoad: false, theme: 'dark', securityLevel: 'loose', flowchart: { useMaxWidth: false, htmlLabels: true, curve: 'basis', nodeSpacing: 45, rankSpacing: 45 } });

                const activeTasks = tasks.filter(t => t.status !== TASK_STATUS.DONE || tasks.some(c => c.dependsOn?.includes(t.id) && c.status !== TASK_STATUS.DONE));
                let def = 'graph TD\n';
                def += 'classDef default fill:#1e293b,stroke:#475569,stroke-width:2px,color:#fff,rx:8,ry:8;\n';
                def += 'classDef done fill:#064e3b,stroke:#059669,color:#fff,rx:8,ry:8;\n';
                def += 'classDef blocked fill:#451a03,stroke:#d97706,color:#fff,stroke-dasharray: 5 5,rx:8,ry:8;\n';
                def += 'classDef ready fill:#0c4a6e,stroke:#0ea5e9,color:#fff,rx:8,ry:8;\n';

                const nodes = new Set(), edges = [];
                activeTasks.forEach(task => {
                    const sid = 't' + task.id.replace(/-/g, '');
                    let cls = 'default';
                    if (task.status === TASK_STATUS.DONE) cls = 'done';
                    else if (task.dependsOn?.some(d => tasks.find(t => t.id === d)?.status !== TASK_STATUS.DONE)) cls = 'blocked';
                    else if (task.dependsOn?.length > 0) cls = 'ready';
                    const title   = task.title.replace(/["#<>]/g, '').substring(0, 18) + (task.title.length > 18 ? '...' : '');
                    const project = (task.project || 'Unassigned').replace(/["#<>]/g, '').substring(0, 15);
                    def += `${sid}["${title}<br/><small>${project}</small>"]:::${cls}\n`;
                    nodes.add(task.id);
                    if (task.dependsOn) task.dependsOn.forEach(depId => {
                        if (activeTasks.some(t => t.id === depId)) edges.push(`t${depId.replace(/-/g, '')} --> ${sid}\n`);
                    });
                });
                if (nodes.size === 0) def = 'graph TD\nEmpty["No Active Dependencies"]\n';
                edges.forEach(e => def += e);

                mermaid.render('mermaid-graph', def).then(({ svg }) => {
                    if (graphRef.current) {
                        graphRef.current.innerHTML = svg;
                        const s = graphRef.current.querySelector('svg');
                        if (s) { s.style.width = '100%'; s.style.height = '100%'; s.style.maxWidth = '100%'; s.setAttribute('preserveAspectRatio', 'xMidYMid meet'); }
